{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Empresas</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Empresas</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableEmpresas" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'id', name: 'id', title: 'Id' },
          { data: 'empresa_nombre', name: 'empresa_nombre', title: 'Nombre' },
          { data: 'empresa_cuit', name: 'empresa_cuit', title: 'CUIT' },
          { data: 'empresa_titular_nombre', name: 'empresa_titular_nombre', title: 'Titular' },
          { data: 'empresa_direccion', name: 'empresa_direccion', title: 'Dirección' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableEmpresas'),
          '/v1/api/datatables/empresas/',
          columns,
          {
              order: [[0, 'asc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/empresas/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
