{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Decretos</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Decretos</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableDecretos" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'instrumentolegaldecretos_tipo', name: 'instrumentolegaldecretos_tipo', title: 'Tipo' },
          { data: 'instrumentolegaldecretos_numero', name: 'instrumentolegaldecretos_numero', title: 'Número' },
          { data: 'instrumentolegaldecretos_ano', name: 'instrumentolegaldecretos_ano', title: 'Año' },
          {
              data: 'instrumentolegaldecretos_fecha_aprobacion', name: 'instrumentolegaldecretos_fecha_aprobacion',
              title: 'Fecha de Aprobación', filterType: 'date',
          },
          { data: 'instrumentolegaldecretos_descripcion', name: 'instrumentolegaldecretos_descripcion', title: 'Descripción' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableDecretos'),
          '/v1/api/datatables/decretos/',
          columns,
          {
              order: [[2, 'desc'], [1, 'desc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/decretos/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
