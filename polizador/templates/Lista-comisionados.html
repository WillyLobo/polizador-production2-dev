{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Comisionados</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Comisionados</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableComisionados" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'agente_apellidos', name: 'agente_apellidos', title: 'Apellidos' },
          { data: 'agente_nombres', name: 'agente_nombres', title: 'Nombre' },
          { data: 'oficina', name: 'oficina', title: 'Cargo' },
          { data: 'cuil', name: 'cuil', title: 'CUIT' },
          {
              data: 'agente_personal_transitorio', name: 'agente_personal_transitorio', title: 'Personal Contratado',
              filterType: 'select', filterChoices: [['true', 'Sí'], ['false', 'No']],
          },
          {
              data: 'agente_personal_de_gabinete', name: 'agente_personal_de_gabinete', title: 'Personal de Gabinete',
              filterType: 'select', filterChoices: [['true', 'Sí'], ['false', 'No']],
          },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableComisionados'),
          '/v1/api/datatables/comisionados/',
          columns,
          {
              order: [[0, 'asc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/comisionados/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
