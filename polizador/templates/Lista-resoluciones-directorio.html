{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Resoluciones Directorio</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Resoluciones Directorio</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableResoluciones" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'instrumentolegalresoluciones_tipo', name: 'instrumentolegalresoluciones_tipo', title: 'Tipo' },
          { data: 'instrumentolegalresoluciones_numero', name: 'instrumentolegalresoluciones_numero', title: 'Número' },
          { data: 'instrumentolegalresoluciones_acta', name: 'instrumentolegalresoluciones_acta', title: 'Acta' },
          { data: 'instrumentolegalresoluciones_ano', name: 'instrumentolegalresoluciones_ano', title: 'Año' },
          {
              data: 'instrumentolegalresoluciones_fecha_aprobacion', name: 'instrumentolegalresoluciones_fecha_aprobacion',
              title: 'Fecha de Aprobación', filterType: 'date',
          },
          { data: 'instrumentolegalresoluciones_descripcion', name: 'instrumentolegalresoluciones_descripcion', title: 'Descripción' },
          { data: 'instrumentolegalresoluciones_document', name: 'instrumentolegalresoluciones_document', title: 'Texto Extraído por OCR' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableResoluciones'),
          '/v1/api/datatables/resoluciones-directorio/',
          columns,
          {
              order: [[3, 'desc'], [1, 'desc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/resoluciones-directorio/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
