{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Regiones</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Regiones</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableRegiones" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'region_numero', name: 'region_numero', title: 'Región' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableRegiones'),
          '/v1/api/datatables/regiones/',
          columns,
          {
              order: [[0, 'asc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/regiones/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
