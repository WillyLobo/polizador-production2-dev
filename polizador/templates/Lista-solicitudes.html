{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Solicitudes</title>{% endblock title%}

<div class="min-vh-100">
  <table id="tableSolicitudes" width="auto" class="table table-striped table-bordered align-middle">
  </table>
</div>


<script language="javascript">

  $(document).ready(function() {
      AjaxDatatableViewUtils.initialize_table(
          $('#tableSolicitudes'),
          "{% url 'secretariador:lista-solicitudes-datatables' %}",
          {
              // extra_options (example)
              processing: false,
              autoWidth: false,
              full_row_select: true,
              scrollX: false,
              dom: "<'row'<'col-sm-12 col-md-4'><'col-sm-12 col-md-4'f><'col-sm-12 col-md-4'l>>" + "<'row'<'col-sm-12'tr>>" + "<'row'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7'p>>",
              // language: {
              // url: "/static/DataTables/DataTables-1.11.5/i18n/es-AR.json",
              // },
          }, {
              // extra_data
              // ...
          },
      );
  });

// Subscribe "rowCallback" event
$('#tableSolicitudes').on('rowCallback', function(event, table, row, data) {
    if (data.solicitud_anulada == 'Sí') {
        $(row).css('background-color', '#ffcccc');
    }
});

</script>

{% endblock %}
