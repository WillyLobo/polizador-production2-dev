{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Solicitudes</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Solicitudes</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableSolicitudes" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'solicitud_actuacion_ano', name: 'solicitud_actuacion_ano', title: 'Año' },
          { data: 'solicitud_actuacion_numero', name: 'solicitud_actuacion_numero', title: 'N° Actuación' },
          { data: 'solicitud_solicitante', name: 'solicitud_solicitante', title: 'Solicitante' },
          { data: 'Comisionados', name: 'Comisionados', title: 'Comisionados', orderable: false },
          { data: 'solicitud_localidades', title: 'Localidades', orderable: false },
          { data: 'solicitud_fecha_desde', name: 'solicitud_fecha_desde', title: 'Fecha Inicio', filterType: 'date' },
          { data: 'solicitud_fecha_hasta', name: 'solicitud_fecha_hasta', title: 'Fecha Regreso', filterType: 'date' },
          { data: 'solicitud_tareas', name: 'solicitud_tareas', title: 'Tareas a Realizar' },
          {
              data: 'solicitud_vehiculo', name: 'solicitud_vehiculo', title: 'Vehículo',
              filterType: 'select', filterChoicesUrl: '/v1/api/datatables/solicitudes/filtro-vehiculos/',
          },
          {
              data: 'solicitud_dia_inhabil', name: 'solicitud_dia_inhabil', title: 'Día Inhábil',
              filterType: 'select', filterChoices: [['true', 'Sí'], ['false', 'No']],
          },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableSolicitudes'),
          '/v1/api/datatables/solicitudes/',
          columns,
          {
              order: [[0, 'desc'], [1, 'desc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/solicitudes/{id}/detalle/',
              dataTableOptions: {
                  rowCallback: function(row, data) {
                      if (data.solicitud_anulada) {
                          $(row).css('background-color', '#ffcccc');
                      }
                  },
              },
          },
      );
  });

</script>

{% endblock %}
