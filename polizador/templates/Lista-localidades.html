{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Localidades</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Localidades</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableLocalidades" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'id', name: 'id', title: 'Id' },
          { data: 'localidad_nombre', name: 'localidad_nombre', title: 'Localidad' },
          { data: 'localidad_municipio', name: 'localidad_municipio', title: 'Municipio' },
          { data: 'localidad_departamento', name: 'localidad_departamento', title: 'Departamento' },
          {
              data: 'localidad_funcion', name: 'localidad_funcion', title: 'Función',
              filterType: 'select', filterChoicesUrl: '/v1/api/datatables/localidades/filtro-funcion/',
          },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableLocalidades'),
          '/v1/api/datatables/localidades/',
          columns,
          {
              order: [[1, 'asc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/localidades/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
