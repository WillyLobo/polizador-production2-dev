{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Municipios</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Municipios</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableMunicipios" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'id', name: 'id', title: 'Id' },
          { data: 'municipio_nombre', name: 'municipio_nombre', title: 'Municipio' },
          { data: 'municipio_departamento', name: 'municipio_departamento', title: 'Departamento' },
          { data: 'municipio_region', name: 'municipio_region', title: 'Región' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableMunicipios'),
          '/v1/api/datatables/municipios/',
          columns,
          {
              order: [[0, 'asc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/municipios/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
