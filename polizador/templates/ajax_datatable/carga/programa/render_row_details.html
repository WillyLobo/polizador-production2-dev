                <div class="row g-1 mb-1">
                    <div class="col-4 text-muted small fw-semibold">ID</div>
                    <div class="col-8 small">{{object.id}}</div>
                </div>
                <div class="row g-1">
                    <div class="col-4 text-muted small fw-semibold">Programa</div>
                    <div class="col-8 small">{{object.programa_nombre}}</div>

            </div>
        </div>

    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header py-2 bg-light fw-semibold small">Datos Adicionales</div>
            <div class="card-body p-2">
                <div class="row g-1 mb-1">
                    <div class="col-4 text-muted small fw-semibold">#</div>
                    <div class="col-8 small"></div>
                </div>
                <div class="row g-1">
                    <div class="col-4 text-muted small fw-semibold">#</div>
                    <div class="col-8 small"></div>

            </div>
        </div>
    </div>

</div>
