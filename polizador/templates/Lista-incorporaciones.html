{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Incorporaciones</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Incorporaciones</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableIncorporaciones" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          { data: 'incorporacion_actuacion_ano', name: 'incorporacion_actuacion_ano', title: 'Año' },
          { data: 'incorporacion_actuacion_numero', name: 'incorporacion_actuacion_numero', title: 'N° Actuación' },
          { data: 'incorporacion_solicitud', name: 'incorporacion_solicitud', title: 'Actuación Relacionada' },
          { data: 'incorporacion_solicitante', name: 'incorporacion_solicitante', title: 'Solicitante' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableIncorporaciones'),
          '/v1/api/datatables/incorporaciones/',
          columns,
          {
              order: [[0, 'desc'], [1, 'desc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/incorporaciones/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
