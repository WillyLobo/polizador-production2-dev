{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Memorandum</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Memorandos</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableMemorandum" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          {
              data: 'instrumentolegalmemorandum_tipo', name: 'instrumentolegalmemorandum_tipo', title: 'Tipo',
              filterType: 'select',
              filterChoices: [['P', 'Presidencia'], ['D', 'Dirección General de Gestión Administrativa']],
          },
          { data: 'instrumentolegalmemorandum_numero', name: 'instrumentolegalmemorandum_numero', title: 'Número' },
          { data: 'instrumentolegalmemorandum_ano', name: 'instrumentolegalmemorandum_ano', title: 'Año' },
          {
              data: 'instrumentolegalmemorandum_fecha_aprobacion', name: 'instrumentolegalmemorandum_fecha_aprobacion',
              title: 'Fecha de Aprobación', filterType: 'date',
          },
          { data: 'instrumentolegalmemorandum_descripcion', name: 'instrumentolegalmemorandum_descripcion', title: 'Descripción' },
          { data: 'instrumentolegalmemorandum_document', name: 'instrumentolegalmemorandum_document', title: 'Texto Extraído por OCR' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableMemorandum'),
          '/v1/api/datatables/memorandums/',
          columns,
          {
              order: [[2, 'desc'], [1, 'desc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/memorandums/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
