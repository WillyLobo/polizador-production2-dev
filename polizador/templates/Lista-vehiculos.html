{% extends "base.html" %}
{% load static %}
{% block content %}
{% block title %}<title>Lista Vehiculos</title>{% endblock title%}

<div class="min-vh-100">
  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Vehículos</div>
    <div class="card-body p-2">
      <div class="table-responsive">
        <table id="tableVehiculos" width="auto" class="table table-striped table-bordered align-middle mb-0">
        </table>
      </div>
    </div>
  </div>
</div>


<script language="javascript">

  $(document).ready(function() {
      var columns = [
          {
              data: 'vehiculo_caracter', name: 'vehiculo_caracter', title: 'Designación',
              filterType: 'select', filterChoices: [['E', 'Empresa'], ['O', 'Oficial'], ['P', 'Particular']],
          },
          { data: 'vehiculo_modelo', name: 'vehiculo_modelo', title: 'Modelo' },
          { data: 'vehiculo_patente', name: 'vehiculo_patente', title: 'Patente' },
          { data: 'vehiculo_poliza', name: 'vehiculo_poliza', title: 'N° Póliza' },
          { data: 'vehiculo_poliza_aseguradora', name: 'vehiculo_poliza_aseguradora', title: 'Aseguradora' },
          { data: 'acciones', title: 'Acciones', orderable: false, searchable: false },
      ];

      NinjaDatatableUtils.initialize_table(
          $('#tableVehiculos'),
          '/v1/api/datatables/vehiculos/',
          columns,
          {
              order: [[1, 'asc']],
              lengthMenu: [[50, 100, -1], [50, 100, 'all']],
              detailUrl: '/v1/api/datatables/vehiculos/{id}/detalle/',
          },
      );
  });

</script>

{% endblock %}
