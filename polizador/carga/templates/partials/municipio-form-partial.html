{% for hidden in form.hidden_fields %}
      {{ hidden }}
{% endfor %}
<div class="card mb-3">
    <div class="card-header py-2 bg-light fw-semibold small">Datos del Municipio</div>
    <div class="card-body p-2">
    <div class="row">
        <div class="col-md-8">
            {{form.municipio_nombre.as_field_group}}
        </div>
        <div class="col-md-4">
            {{form.id.as_field_group}}
        </div>
    </div>
    <div class="row">
        <div class="col-md-6">
            {{form.municipio_departamento.as_field_group}}
        </div>
        <div class="col-md-6">
            {{form.municipio_region.as_field_group}}
        </div>
    </div>
    </div>
</div>
