{% for hidden in form.hidden_fields %}
      {{ hidden }}
{% endfor %}

{{ form.non_field_errors }}

<fieldset class="border rounded border-dark p-1">
    <legend class="border-bottom border-dark bg-dark text-white rounded p-1">Foja de Medición</legend>
    <div class="form-group">
        {{form.foja_rubro.as_field_group}}
    </div>
    <div class="row">
        <div class="col-md-4">
            {{form.foja_periodo.as_field_group}}
        </div>
        <div class="col-md-4">
            {{form.foja_fecha.as_field_group}}
        </div>
        <div class="col-md-4">
            {{form.foja_inspector.as_field_group}}
        </div>
    </div>
    <div class="form-group">
        {{form.foja_observaciones.as_field_group}}
    </div>
</fieldset>
