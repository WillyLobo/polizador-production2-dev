{% for hidden in form.hidden_fields %}
      {{ hidden }}
{% endfor %}

<fieldset class="border rounded border-dark p-1">
    <legend class="border-bottom border-dark bg-dark text-white rounded p-1">Rubro de Plan de Trabajos</legend>
    <div class="form-group">
        {{form.rubro_plan.as_field_group}}
    </div>
    <div class="form-group">
        {{form.rubro_anterior.as_field_group}}
    </div>
    <div class="row">
        <div class="col-md-2">
            {{form.rubro_orden.as_field_group}}
        </div>
        <div class="col-md-6">
            {{form.rubro_nombre.as_field_group}}
        </div>
        <div class="col-md-4">
            {{form.rubro_presupuesto.as_field_group}}
        </div>
    </div>
</fieldset>
