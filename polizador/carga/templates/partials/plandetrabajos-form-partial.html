{% for hidden in form.hidden_fields %}

{% endfor %}

<fieldset class="border rounded border-dark p-1">
    <legend class="border-bottom border-dark bg-dark text-white rounded p-1">Plan de Trabajos</legend>
    <div class="form-group">
        {{form.trabajos_obra.as_field_group}}
    </div>
    <div class="form-group">
        {{form.trabajos_fecha.as_field_group}}
    </div>
    <div class="form-group">
        {{form.trabajos_meses.as_field_group}}
    </div>
    <div class="form-group">
        {{form.trabajos_contrato.as_field_group}}
    </div>
</fieldset>
