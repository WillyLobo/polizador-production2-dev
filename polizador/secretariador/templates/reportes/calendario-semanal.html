{% extends "base.html" %}

{% block content  %}
{% load static %}
{% load l10n %}

{% block title%}<title>Crear Reporte Viaticos por Agente</title>{% endblock title %}

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
<script>

    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            locale: 'es',
            initialView: 'dayGridWeek',
            contentHeight:"auto",
            initialDate: "{{solicitud.initial_date}}",
            headerToolbar: {
                left: 'prev,next',
                center: 'title',
                right: 'prev,next' // user can switch between the two
            },
            events: [
            {% for solicitud in solicitud.comisiones %}
            {
                title: "{{solicitud.0}}",
                start: "{{solicitud.1|date:'Y-m-d'}}",
                end: "{{solicitud.2|date:'Y-m-d'}}",
                url: "{{solicitud.3}}",
                backgroundColor: "{{solicitud.4}}",
                borderColor:"{{solicitud.5}}",
                allDay: true,
            },
            {%endfor%}
            ]
        });
        calendar.render();
    });

</script>

<div class="min-vh-100 min-vw-100 p-4">

  <div class="card">
    <div class="card-header py-2 bg-light fw-semibold small">Calendario Semanal</div>
    <div class="card-body p-3">
      <div class="container-fluid" id='calendar'></div>
    </div>
  </div>
</div>

<script>
    $(document).ready(function () {
        $('#id_agente').select2({
            theme: "bootstrap-5",
            ajax: {
                url: '/viaticos/ajax/get_agentes/',
                dataType: "json",
                type: "GET",
                delay: 250,
                data: function (params) {
                    console.log(params);
                    var queryParameters = {
                        q: params.term
                    }
                    return queryParameters;
                },
            },
            placeholder: 'Nombre del Agente a buscar',
            minimumInputLength: 2
        });
    });
</script>
{% endblock %}
