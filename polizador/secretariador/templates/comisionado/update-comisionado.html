{% extends "base.html" %}

{% block content %}
{%block title%}<title>{{title}}</title>{%endblock title%}

{{ form.media.css }}
<form id="mainForm" action='{% url "secretariador:update-comisionado" object.id %}' method="POST" enctype="multipart/form-data">
  {% csrf_token %}
  {% include "partials/comisionados-form-partial.html" %}
</form>
{{ form.media.js }}
<script>
  const dniInput = document.getElementById('id_dni');
  dniInput.addEventListener('change', function() {
    var input = dniInput.value;
    if (!input || input.length !== 8) {
      input = "00000000";
    }
    else {
      input = dniInput.value;
    }
    const gender = document.getElementById('id_sexo').value;
    const cuit = getCUIT(input, gender);
    $('#cuit-calculado').text("CUIT: " + cuit);
  });
</script>
{% endblock %}

{% block actions %}
  {% include "partials/form-actions.html" %}
{% endblock %}
